<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070b16" />
    <title>IITIL Portal</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #070b16;
      }

      .portal-boot {
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: #e5f7ff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .portal-boot__mark {
        display: grid;
        height: 48px;
        width: 48px;
        place-items: center;
        border-radius: 16px;
        background: linear-gradient(135deg, #67e8f9, #8b5cf6);
        color: #07111f;
        font-weight: 900;
        box-shadow: 0 0 34px rgba(34, 211, 238, 0.22);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="portal-boot">
        <div class="portal-boot__mark">IT</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
